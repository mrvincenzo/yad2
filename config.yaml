# Yad2 Apartment Watcher — Configuration
# ----------------------------------------
# Docs: https://github.com/ilia/yad2-watcher

telegram:
  # bot_token is loaded from .env (YAD2_BOT_TOKEN) — do not store here
  # Run: poetry run yad2-watcher get-chat-id  (after messaging the bot)
  chat_ids:
    - "422717997" # me
    - "8233983837" # father
  error_chat_ids:
    - "422717997" # Send errors here

watcher:
  # How often to poll each neighborhood (in minutes)
  interval_minutes: 60
  # Path to the SQLite database file
  db_path: "~/.yad2_watcher/seen.db"
  # Path to the directory where rotating log files are stored
  log_dir: "~/.yad2_watcher/logs"
  # Maximum size of each log file in megabytes
  max_log_size_mb: 1
  # Request timeout in seconds
  request_timeout: 20
  # Delay between neighborhood fetches (seconds) — ±50% jitter is applied automatically
  fetch_delay_seconds: 5
  # Path where session cookies are persisted between runs (helps avoid CAPTCHA)
  cookies_path: "~/.yad2_watcher/cookies.json"
  # Journal: append every new listing to a monthly Markdown file
  journal_enabled: true
  journal_path: "~/.yad2_watcher/journal"

# Shared search filters applied to all neighborhoods
search_defaults:
  min_price: 6000
  max_price: 9000
  min_rooms: 4
  max_rooms: 4.5
  area: 7        # area=7 → Jerusalem area
  city: 3000     # city=3000 → Jerusalem

# Neighborhoods to monitor
# Each entry needs: id, name, url_slug
# url_slug is the path segment after /realestate/rent/  (e.g. jerusalem-area)
